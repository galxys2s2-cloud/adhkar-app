<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A237E">
  <meta name="description" content="تطبيق الأذكار — أذكار الصباح والمساء، أدعية مأثورة، تسبيح">
  <title>أذكاري</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1A237E;
    }
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #D4AF37;
      font-family: 'Amiri', serif;
      font-size: 1.5rem;
    }
  </style>
  <script>
    // Service worker registration for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/adhkar-app/flutter_service_worker.js');
      });
    }
  </script>
</head>
<body>
  <div id="loading">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.load({
        serviceWorkerSettings: {
          serviceWorkerVersion: '{{flutter_version}}'
        }
      }).then(function(engineInitializer) {
        return engineInitializer.initializeEngine();
      }).then(function(appRunner) {
        return appRunner.runApp();
      });
    });
  </script>
</body>
</html>
