name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Flutter pub get
        run: flutter pub get
        
      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi --android-skip-build-dependency-validation
        
      - name: Upload APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: adhkar-app-release-apk
          path: |
            build/app/outputs/flutter-apk/app-*-release.apk

      - name: Upload APK (GitHub Release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="v1.0.0"
          cat > /tmp/release-notes.md << EOF
          تطبيق الأذكار — النسخة v1.0.0

          * أذكار الصباح والمساء
          * أدعية مأثورة (نوم، استيقاظ، أكل، سفر، عامة)
          * أذكار بعد الصلاة
          * عداد تسبيح مع auto-advance
          * واجهة تراثية عربية (خط Amiri)

          ⚡ Offline-First — لا يحتاج إنترنت

          تم البناء في $(date -u '+%Y-%m-%d %H:%M UTC')
          EOF

          # Delete existing release+tag if they exist (to update)
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" \
            build/app/outputs/flutter-apk/app-*-release.apk \
            --title "أذكاري v1.0.0" \
            --notes-file /tmp/release-notes.md \
            --latest
